name: Build Android (.apk)

# Run it manually from the GitHub "Actions" tab → "Build Android (.apk)" →
# "Run workflow". Builds an installable .apk with `eas build --local` on
# GitHub's free Ubuntu runner (no EAS build credits used) and uploads it as a
# download. The .apk can be sideloaded onto any Android device for testing.
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Free up disk space (remove preinstalled tools we don't need)
        run: |
          echo "Disk before:"; df -h /
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup \
            /usr/local/share/boost /usr/share/swift \
            /opt/hostedtoolcache/CodeQL /opt/hostedtoolcache/PyPy || true
          sudo docker image prune -a -f || true
          echo "Disk after:"; df -h /

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Raise Gradle memory (fix KSP Metaspace OOM)
        # Written to the global Gradle home so it survives `expo prebuild`
        # regenerating android/gradle.properties during `eas build --local`.
        run: |
          mkdir -p ~/.gradle
          echo 'org.gradle.jvmargs=-Xmx4096m -XX:MaxMetaspaceSize=1024m -Dfile.encoding=UTF-8' >> ~/.gradle/gradle.properties

      - name: Cache Gradle (reuse compiled native libs across runs)
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            android/.gradle
            android/app/.cxx
          key: gradle-${{ runner.os }}-${{ hashFiles('**/package-lock.json', 'app.json', 'eas.json') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Install eas-cli
        run: npm install -g eas-cli

      - name: Install dependencies
        run: npm install

      - name: Setup Android SDK (puts sdkmanager on PATH + accepts licenses)
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: sdkmanager "platforms;android-36" "build-tools;34.0.0" "ndk;27.3.13750724" "cmake;3.22.1"

      - name: Build .apk (local — free, no EAS credits)
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
        run: |
          eas build --local \
            --platform android \
            --profile preview \
            --non-interactive \
            --output "${{ github.workspace }}/app-release.apk"

      - name: Upload .apk
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: app-release.apk
          if-no-files-found: error
          retention-days: 14
